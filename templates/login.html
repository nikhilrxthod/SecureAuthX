<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SecuAuthX Login Page</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body> 
  <div class="flash-container">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="flash-message flash-{{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}
  </div>

  <div class="container">
    <div class="logo">
      <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo" />
      <h1>SecuAuth<span>X</span></h1>
    </div>

    <form id="loginForm" method="POST" action="{{ url_for('login') }}">
      <label for="email" class="form-label">EMAIL ADDRESS</label>
      <input type="email" id="email" name="email" />
      <div id="email-error" class="error-message hidden">Please enter a valid email address</div>

      <label for="password" class="form-label">ENTER PASSWORD</label>
      <input type="password" id="password" name="password" autocomplete="off" />
      <div id="password-error" class="error-message hidden">Password must be at least 8 characters</div>

      <button id="submit-button" type="submit" disabled>
        <span id="submit-text">LOGIN</span>
        <span id="submit-spinner" class="spinner hidden"></span>
      </button>

      <div class="auth-link">
        <span class="text-grey">New user?</span><a href="{{ url_for('register') }}">Register here</a>
      </div>
    </form>
  </div>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
